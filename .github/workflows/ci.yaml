name: Node.js CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '18'
          cache: 'npm'

      # Install
      - name: Install dependencies
        run: npm install   # or npm ci if package-lock.json exists

      # Test
      - name: Run tests
        run: npm test

      # Build
      - name: Build project
        run: npm run build

      # Docker Build
      - name: Build Docker image
        run: docker build -t my-node-app:latest .
