name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x] # Test across multiple LTS versions

    steps:
      # 1. Checkout the latest code from the repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Setup specific Node.js version and enable npm caching
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      # 3. Clean install of dependencies (uses package-lock.json)
      - name: Install Dependencies
        run: npm ci

      # 4. Run existing tests
      - name: Run Tests
        run: npm test

      # 5. Build project (only if a build script exists in package.json)
      - name: Build Project
        run: npm run build --if-present
